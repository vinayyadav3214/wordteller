<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Word Explorer">
<title>Word Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,600;1,400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --mint: #3DD9A0; --mint-light: #E8FBF4; --mint-dark: #0F6E56;
    --lavender: #9B8FF5; --lavender-light: #F0EEFF; --peach: #F7896A;
    --bg: #F8F7FF; --card: #FFFFFF; --text: #1A1A2E;
    --muted: #6B6B8A; --border: rgba(155,143,245,0.2);
  }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; }

  .app-header {
    background: linear-gradient(135deg, #9B8FF5 0%, #3DD9A0 100%);
    padding: 20px 20px 24px; text-align: center; position: relative; overflow: hidden; flex-shrink: 0;
  }
  .app-header::before { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); }
  .app-title { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: -0.5px; position: relative; z-index: 1; }
  .app-subtitle { font-size: 12px; color: rgba(255,255,255,0.85); margin-top: 3px; position: relative; z-index: 1; }

  .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { flex: 1; padding: 13px 8px; text-align: center; font-size: 13px; font-weight: 700; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 2.5px solid transparent; font-family: 'Nunito', sans-serif; transition: all 0.2s; }
  .tab.active { color: var(--lavender); border-bottom-color: var(--lavender); }

  .screen { display: none; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .screen.active { display: flex; flex-direction: column; }

  .lookup-body { display: flex; flex-direction: column; align-items: center; padding: 24px 20px 40px; gap: 18px; }

  .mic-area { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
  .mic-hint { font-size: 14px; color: var(--muted); font-weight: 600; text-align: center; }
  .mic-btn {
    width: 110px; height: 110px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, var(--lavender) 0%, var(--mint) 100%);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 12px 40px rgba(155,143,245,0.4);
    transition: transform 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .mic-btn:active { transform: scale(0.94); }
  .mic-btn.listening { animation: pulse-ring 1.2s ease-out infinite; background: linear-gradient(135deg, var(--peach) 0%, var(--lavender) 100%); }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(247,137,106,0.6); }
    70%  { box-shadow: 0 0 0 24px rgba(247,137,106,0); }
    100% { box-shadow: 0 0 0 0 rgba(247,137,106,0); }
  }
  .mic-icon { width: 42px; height: 42px; fill: #fff; }
  .mic-status { font-size: 13px; font-weight: 700; color: var(--lavender); height: 18px; text-align: center; }
  .mic-status.listening { color: var(--peach); }

  .divider { display: flex; align-items: center; gap: 10px; width: 100%; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-size: 12px; color: var(--muted); font-weight: 700; }

  .search-row { display: flex; gap: 8px; width: 100%; }
  .word-input {
    flex: 1; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 14px;
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600;
    background: var(--card); color: var(--text); outline: none; -webkit-appearance: none;
  }
  .word-input:focus { border-color: var(--lavender); }
  .word-input::placeholder { color: var(--muted); font-weight: 500; }
  .search-btn {
    padding: 13px 18px; border-radius: 14px; border: none;
    background: var(--lavender); color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }

  .result-card {
    background: var(--card); border-radius: 20px; border: 1.5px solid var(--border);
    padding: 22px; width: 100%; box-shadow: 0 8px 32px rgba(61,217,160,0.15);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  .result-word { font-family: 'Lora', Georgia, serif; font-size: 26px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .result-pos { display: inline-block; background: var(--lavender-light); color: var(--lavender); font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
  .result-phonetic { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 10px; display: block; }
  .meaning-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--mint-dark); margin-bottom: 6px; }
  .meaning-text { font-size: 15px; line-height: 1.65; color: var(--text); margin-bottom: 14px; font-weight: 600; }
  .example-box {
    background: var(--mint-light); border-left: 3px solid var(--mint); border-radius: 0 10px 10px 0;
    padding: 11px 14px; font-size: 14px; color: var(--mint-dark); font-style: italic;
    font-family: 'Lora', Georgia, serif; line-height: 1.55; margin-bottom: 16px;
  }
  .synonyms-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .synonym-pill {
    background: var(--lavender-light); color: var(--lavender); font-size: 12px; font-weight: 700;
    padding: 4px 12px; border-radius: 20px; cursor: pointer; border: none;
    font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent;
  }
  .save-btn {
    width: 100%; padding: 13px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, var(--mint) 0%, #5BC8F5 100%);
    color: #fff; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
    cursor: pointer; box-shadow: 0 6px 20px rgba(61,217,160,0.35); -webkit-tap-highlight-color: transparent;
  }
  .save-btn.saved { background: linear-gradient(135deg, #A8E063 0%, #56AB2F 100%); box-shadow: none; }

  .error-msg {
    background: #FFF0F0; border: 1.5px solid #FFB3B3; border-radius: 14px;
    padding: 16px; color: #C0392B; font-size: 13px; font-weight: 600;
    text-align: center; width: 100%; animation: slideUp 0.3s ease; line-height: 1.6;
  }
  .loading-dots { display: flex; gap: 5px; align-items: center; justify-content: center; padding: 24px 0; }
  .loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--lavender); animation: bounce 0.9s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-9px); opacity: 1; } }

  .info-note { background: #FFF8E7; border: 1.5px solid #FFD166; border-radius: 12px; padding: 12px 14px; font-size: 13px; color: #7A5C00; font-weight: 600; width: 100%; text-align: center; line-height: 1.5; }

  .notebook-body { flex: 1; padding: 16px 20px 40px; display: flex; flex-direction: column; gap: 12px; }
  .notebook-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; gap: 10px; }
  .empty-icon { font-size: 48px; margin-bottom: 8px; }
  .empty-title { font-size: 18px; font-weight: 800; color: var(--text); }
  .empty-sub { font-size: 14px; color: var(--muted); max-width: 220px; font-weight: 500; }

  .notebook-stats { background: var(--lavender-light); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .stats-count { font-size: 22px; font-weight: 900; color: var(--lavender); }
  .stats-label { font-size: 13px; color: var(--muted); font-weight: 600; margin-top: 1px; }
  .clear-btn { font-size: 12px; font-weight: 700; color: var(--peach); background: none; border: 1.5px solid var(--peach); border-radius: 20px; padding: 5px 12px; cursor: pointer; font-family: 'Nunito', sans-serif; }

  .vocab-entry { background: var(--card); border-radius: 16px; border: 1.5px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 6px; animation: slideUp 0.25s ease; flex-shrink: 0; }
  .entry-header { display: flex; align-items: center; justify-content: space-between; }
  .entry-word { font-family: 'Lora', Georgia, serif; font-size: 18px; font-weight: 600; color: var(--text); }
  .entry-delete { width: 30px; height: 30px; border-radius: 50%; border: none; background: #FFF0F0; color: #E74C3C; font-size: 15px; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; flex-shrink: 0; }
  .entry-pos { display: inline-block; background: var(--lavender-light); color: var(--lavender); font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.4px; width: fit-content; }
  .entry-meaning { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.5; }
  .entry-example { font-size: 13px; color: var(--muted); font-style: italic; font-family: 'Lora', Georgia, serif; line-height: 1.45; border-left: 2.5px solid var(--mint); padding-left: 10px; margin-top: 2px; }
  .entry-date { font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 2px; }

  .lang-block { border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; }
  .english-block { background: #F0EEFF; border-left: 4px solid var(--lavender); }
  .telugu-block { background: #E8FBF4; border-left: 4px solid var(--mint); }
  .lang-label { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; color: var(--text); opacity: 0.6; }
  .lang-text { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.7; }
  .telugu-text { font-size: 15px; line-height: 1.9; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">✨ Word Explorer</div>
  <div class="app-subtitle">Tap the mic or type any word to learn its meaning!</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('lookup')">🔍 Look Up</button>
  <button class="tab" onclick="switchTab('notebook')">📒 My Notebook</button>
</div>

<div class="screen active" id="screen-lookup">
  <div class="lookup-body">
    <div id="micNote" class="info-note" style="display:none;">
      🎤 Voice works best in <strong>Safari</strong>. You can also type the word below!
    </div>
    <div class="mic-area">
      <div class="mic-hint">Tap the mic and say a word!</div>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">
        <svg class="mic-icon" viewBox="0 0 24 24">
          <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm7 7a1 1 0 0 1 1 1 8 8 0 0 1-7 7.93V21h2a1 1 0 0 1 0 2H9a1 1 0 0 1 0-2h2v-2.07A8 8 0 0 1 4 11a1 1 0 0 1 2 0 6 6 0 0 0 12 0 1 1 0 0 1 1-1z"/>
        </svg>
      </button>
      <div class="mic-status" id="micStatus">Tap to speak</div>
    </div>
    <div class="divider"><span>or type a word</span></div>
    <div class="search-row">
      <input class="word-input" id="wordInput" type="text" placeholder="e.g. slick, ephemeral..."
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
        onkeydown="if(event.key==='Enter'){this.blur();lookupWord();}">
      <button class="search-btn" onclick="lookupWord()">Go</button>
    </div>
    <div id="resultArea" style="width:100%;"></div>
  </div>
</div>

<div class="screen" id="screen-notebook">
  <div class="notebook-body" id="notebookBody"></div>
</div>

<script>
var currentWord = null;
var recognition = null;
var isListening = false;

// CORS proxy — routes requests through a server that adds CORS headers
var PROXY = 'https://corsproxy.io/?';
var DICT_URL = 'https://api.dictionaryapi.dev/api/v2/entries/en/';
var GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';
var GROQ_KEY = '';

if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
  document.getElementById('micNote').style.display = 'block';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', ['lookup','notebook'][i] === tab);
  });
  document.getElementById('screen-lookup').classList.toggle('active', tab === 'lookup');
  document.getElementById('screen-notebook').classList.toggle('active', tab === 'notebook');
  if (tab === 'notebook') renderNotebook();
}

function toggleMic() {
  var hasSR = ('webkitSpeechRecognition' in window) || ('SpeechRecognition' in window);
  if (!hasSR) { document.getElementById('micNote').style.display = 'block'; document.getElementById('wordInput').focus(); return; }
  if (isListening) { if (recognition) recognition.stop(); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US'; recognition.interimResults = false; recognition.maxAlternatives = 1;
  recognition.onstart = function() {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    var s = document.getElementById('micStatus'); s.textContent = 'Listening... say a word!'; s.classList.add('listening');
  };
  recognition.onresult = function(e) {
    var word = e.results[0][0].transcript.trim().toLowerCase().replace(/[^a-z '-]/g,'').split(' ')[0];
    document.getElementById('wordInput').value = word;
    lookupWord();
  };
  recognition.onerror = function() { resetMic(); showError('Could not hear you. Please try again or type the word!'); };
  recognition.onend = function() { resetMic(); };
  recognition.start();
}

function resetMic() {
  isListening = false;
  document.getElementById('micBtn').classList.remove('listening');
  var s = document.getElementById('micStatus'); s.textContent = 'Tap to speak'; s.classList.remove('listening');
}

async function lookupWord() {
  var word = document.getElementById('wordInput').value.trim();
  if (!word) return;
  document.getElementById('resultArea').innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

  // Try Groq directly first, then via proxy
  try {
    var result = await callGroq(word, false);
    if (result) { currentWord = result; renderResult(currentWord); return; }
  } catch(e) {}

  try {
    var result2 = await callGroq(word, true);
    if (result2) { currentWord = result2; renderResult(currentWord); return; }
  } catch(e) {}

  showError('Could not look up "' + esc(word) + '". Please check your internet and try again.');
}

async function callGroq(word, useProxy) {
  var prompt = `You are a fun, friendly teacher explaining English words to an 8th grade Telugu-speaking student.
For the word "${word}", reply ONLY with a raw JSON object (no markdown, no code fences):
{
  "word": "${word}",
  "english": "A fun, simple explanation in English. Start with what the word means in a relatable way, give a real-life example a kid can picture. Use casual language. Keep it 2-3 sentences.",
  "telugu": "అదే వివరణను తెలుగులో ఇవ్వండి. సులభమైన భాషలో, పిల్లలకు అర్థమయ్యేలా చెప్పండి. 2-3 వాక్యాలు.",
  "synonyms": ["word1", "word2", "word3"]
}`;

  var url = useProxy ? PROXY + encodeURIComponent(GROQ_URL) : GROQ_URL;
  var resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
    body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: [{ role: 'user', content: prompt }], temperature: 0.4, max_tokens: 500 })
  });
  if (!resp.ok) throw new Error('Groq ' + resp.status);
  var data = await resp.json();
  var raw = data.choices[0].message.content.trim().replace(/```json|```/g,'').trim();
  var match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('bad JSON');
  var r = JSON.parse(match[0]);
  return {
    word: r.word || word,
    english: r.english || '',
    telugu: r.telugu || '',
    synonyms: r.synonyms || [],
    date: today()
  };
}

function showError(msg) {
  document.getElementById('resultArea').innerHTML = '<div class="error-msg">❌ ' + msg + '</div>';
}

function renderResult(w) {
  var saved = isSaved(w.word);
  var h = '<div class="result-card">';
  h += '<div class="result-word">' + esc(w.word) + '</div>';

  // English explanation
  h += '<div class="lang-block english-block">';
  h += '<div class="lang-label">🇬🇧 English</div>';
  h += '<div class="lang-text">' + esc(w.english) + '</div>';
  h += '</div>';

  // Telugu explanation
  h += '<div class="lang-block telugu-block">';
  h += '<div class="lang-label">🇮🇳 తెలుగు</div>';
  h += '<div class="lang-text telugu-text">' + esc(w.telugu) + '</div>';
  h += '</div>';

  // Synonyms
  if (w.synonyms && w.synonyms.length) {
    h += '<div class="meaning-label" style="margin-bottom:8px;">Similar Words</div>';
    h += '<div class="synonyms-row">';
    w.synonyms.forEach(function(s) { h += '<button class="synonym-pill" onclick="tapSynonym(\'' + esc(s) + '\')">' + esc(s) + '</button>'; });
    h += '</div>';
  }

  h += '<button class="save-btn' + (saved?' saved':'') + '" id="saveBtn" onclick="saveWord()">' + (saved ? '✓ Saved to Notebook!' : '+ Save to My Notebook') + '</button>';
  h += '</div>';
  document.getElementById('resultArea').innerHTML = h;
}

function tapSynonym(word) { document.getElementById('wordInput').value = word; lookupWord(); }
function today() { return new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function getNotebook() { try { return JSON.parse(localStorage.getItem('wordExplorer_vocab')||'[]'); } catch(e) { return []; } }
function saveNotebook(nb) { localStorage.setItem('wordExplorer_vocab', JSON.stringify(nb)); }
function isSaved(word) { return getNotebook().some(function(e){ return e.word.toLowerCase()===word.toLowerCase(); }); }

function saveWord() {
  if (!currentWord) return;
  var nb = getNotebook();
  if (isSaved(currentWord.word)) return;
  nb.unshift(currentWord);
  saveNotebook(nb);
  var btn = document.getElementById('saveBtn');
  if (btn) { btn.textContent = '✓ Saved to Notebook!'; btn.classList.add('saved'); }
}

function deleteWord(word) {
  saveNotebook(getNotebook().filter(function(e){ return e.word !== word; }));
  renderNotebook();
}

function renderNotebook() {
  var nb = getNotebook();
  var body = document.getElementById('notebookBody');
  if (!nb.length) {
    body.innerHTML = '<div class="notebook-empty"><div class="empty-icon">📖</div><div class="empty-title">No words yet!</div><div class="empty-sub">Look up a word and save it to build your vocabulary notebook.</div></div>';
    return;
  }
  var h = '<div class="notebook-stats"><div><div class="stats-count">'+nb.length+'</div><div class="stats-label">'+(nb.length===1?'word saved':'words saved')+'</div></div><button class="clear-btn" onclick="clearAll()">Clear all</button></div>';
  nb.forEach(function(e) {
    h += '<div class="vocab-entry"><div class="entry-header"><div class="entry-word">'+esc(e.word)+'</div><button class="entry-delete" onclick="deleteWord(\''+esc(e.word)+'\')">✕</button></div>';
    if (e.english) h += '<div class="lang-block english-block"><div class="lang-label">🇬🇧 English</div><div class="lang-text">'+esc(e.english)+'</div></div>';
    if (e.telugu) h += '<div class="lang-block telugu-block"><div class="lang-label">🇮🇳 తెలుగు</div><div class="lang-text telugu-text">'+esc(e.telugu)+'</div></div>';

    if (e.date) h += '<div class="entry-date">Saved on '+e.date+'</div>';
    h += '</div>';
  });
  body.innerHTML = h;
}

function clearAll() {
  if (confirm('Clear all saved words?')) { localStorage.removeItem('wordExplorer_vocab'); renderNotebook(); }
}
</script>
</body>
</html>
